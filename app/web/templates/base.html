<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}A股选股日报{% endblock %}</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif;
      background: #0f1117;
      color: #e8e8e8;
      min-height: 100vh;
    }
    /* ---- 导航 ---- */
    nav {
      background: #1a1d2e;
      border-bottom: 1px solid #2d3052;
      padding: 8px 24px;
      display: flex;
      align-items: center;
      flex-wrap: wrap;          /* 挤不下时整体换行，不压扁单项 */
      min-height: 52px;
      gap: 10px 22px;
    }
    nav .brand {
      font-size: 16px;
      font-weight: 700;
      color: #7c9ef8;
      text-decoration: none;
      white-space: nowrap;
    }
    nav a {
      color: #9ca3af;
      text-decoration: none;
      font-size: 14px;
      padding: 4px 8px;
      border-radius: 4px;
      transition: all .15s;
      white-space: nowrap;      /* 每项文字保持一行，不竖着折断 */
    }
    nav a:hover, nav a.active { color: #fff; background: #2d3052; }
    /* ---- 主容器 ---- */
    .container { max-width: 1100px; margin: 0 auto; padding: 32px 24px; }
    /* ---- 卡片 ---- */
    .card {
      background: #1a1d2e;
      border: 1px solid #2d3052;
      border-radius: 8px;
      padding: 20px 24px;
      margin-bottom: 16px;
    }
    .card h2 { font-size: 15px; color: #7c9ef8; margin-bottom: 12px; }
    /* ---- 表格 ---- */
    table { width: 100%; border-collapse: collapse; font-size: 13px; }
    th {
      background: #232640;
      color: #9ca3af;
      font-weight: 500;
      padding: 8px 12px;
      text-align: left;
      border-bottom: 1px solid #2d3052;
    }
    td {
      padding: 8px 12px;
      border-bottom: 1px solid #1e2138;
      vertical-align: middle;
    }
    tr:hover td { background: #1e2138; }
    /* ---- Badge ---- */
    .badge {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 12px;
      font-size: 11px;
      font-weight: 600;
    }
    .badge-green { background: #1a3b2a; color: #4ade80; }
    .badge-red   { background: #3b1a1a; color: #f87171; }
    .badge-yellow{ background: #3b3218; color: #fbbf24; }
    .badge-blue  { background: #1a2b4a; color: #7c9ef8; }
    /* ---- 正负数颜色 ---- */
    .pos { color: #4ade80; }
    .neg { color: #f87171; }
    .neu { color: #9ca3af; }
    {% block extra_style %}{% endblock %}
  </style>
</head>
<body>
<nav>
  <a class="brand" href="/">📈 A股Agent</a>
  <a href="/sentiment" {% if page=='sentiment' %}class="active"{% endif %}>🌡️ 大盘情绪</a>
  <a href="/industry" {% if page=='industry' %}class="active"{% endif %}>💰 行业资金</a>
  <a href="/concept" {% if page=='concept' %}class="active"{% endif %}>🧩 概念资金</a>
  <a href="/llm" {% if page=='llm' %}class="active"{% endif %}>🧠 LLM分析</a>
  <a href="/bull" {% if page=='bull' %}class="active"{% endif %}>🐂 牛股发掘</a>
  <a href="/research" {% if page=='research' %}class="active"{% endif %}>📑 研报中心</a>
  <a href="/analysts" {% if page=='analysts' %}class="active"{% endif %}>🏅 金牌分析师</a>
  <a href="/portfolio" {% if page=='portfolio' %}class="active"{% endif %}>💼 我的持仓</a>
  <a href="/" {% if page=='index' %}class="active"{% endif %}>报告中心</a>
  <a href="/screener" {% if page=='screener' %}class="active"{% endif %}>🔍 因子选股</a>
  <a href="/backtest" {% if page=='backtest' %}class="active"{% endif %}>🔬 个股回测</a>
  {# 策略验证/前向追踪暂从导航隐藏（数据未积累、归因功能已并入个股回测）；路由保留可直达 #}
  {# <a href="/strategy" {% if page=='strategy' %}class="active"{% endif %}>📊 策略验证</a> #}
  {# <a href="/tracking" {% if page=='tracking' %}class="active"{% endif %}>前向追踪</a> #}
</nav>
<div class="container">
  {% block content %}{% endblock %}
</div>
{% block extra_script %}{% endblock %}

<!-- 🤖 全局 AI 投研问答（悬浮·所有页面可用·接真实金融数据） -->
<style>
#aic-btn { position:fixed; right:22px; bottom:22px; width:54px; height:54px; border-radius:50%;
  background:linear-gradient(135deg,#3358e0,#5d7cff); color:#fff; font-size:26px; display:flex;
  align-items:center; justify-content:center; cursor:pointer; box-shadow:0 4px 16px rgba(51,88,224,.5); z-index:9998; }
#aic-panel { position:fixed; right:22px; bottom:88px; width:430px; max-width:calc(100vw - 28px);
  height:620px; max-height:calc(100vh - 120px); background:#0f1117; border:1px solid #2d3052; border-radius:14px;
  display:none; flex-direction:column; z-index:9999; box-shadow:0 8px 40px rgba(0,0,0,.6); overflow:hidden; }
#aic-panel.open { display:flex; }
.aic-head { display:flex; align-items:center; gap:6px; padding:10px 14px; background:#161929; border-bottom:1px solid #242842; }
.aic-head b { color:#cdd6f4; font-size:14px; flex:1; }
.aic-ico { color:#7c9ef8; cursor:pointer; font-size:15px; padding:2px 6px; }
.aic-ses { display:none; background:#0d0f16; border-bottom:1px solid #242842; max-height:170px; overflow-y:auto; }
.aic-ses.open { display:block; }
.aic-srow { display:flex; align-items:center; padding:7px 14px; font-size:12.5px; color:#cdd6f4; cursor:pointer; border-bottom:1px solid #1a1d2e; }
.aic-srow:hover { background:#1a1d2e; } .aic-srow.cur { color:#7c9ef8; }
.aic-srow .del { color:#f87171; margin-left:auto; font-size:11px; }
.aic-msgs { flex:1; overflow-y:auto; padding:12px; }
.aic-msg { margin-bottom:12px; }
.aic-msg.user { text-align:right; }
.aic-msg.user .bubble { background:#2742a8; color:#fff; display:inline-block; padding:7px 12px; border-radius:12px 12px 2px 12px; max-width:85%; text-align:left; font-size:13px; line-height:1.6; }
.aic-msg.ai .bubble { background:#161929; border:1px solid #242842; color:#cdd6f4; padding:9px 13px; border-radius:12px 12px 12px 2px; display:inline-block; max-width:96%; font-size:13px; line-height:1.7; }
.aic-status { color:#7c9ef8; font-size:12px; }
.aic-md h1,.aic-md h2,.aic-md h3 { color:#7c9ef8; margin:8px 0 4px; font-size:14px; }
.aic-md table { border-collapse:collapse; margin:6px 0; font-size:12px; } .aic-md th,.aic-md td { border:1px solid #2d3052; padding:3px 8px; } .aic-md th { background:#232640; }
.aic-md ul { margin:4px 0 4px 18px; } .aic-md li { margin:2px 0; } .aic-md code { background:#232640; padding:1px 4px; border-radius:3px; }
.aic-md blockquote { border-left:3px solid #3d4068; padding:2px 10px; margin:6px 0; color:#9ca3af; }
.aic-md a { color:#7c9ef8; }
.aic-in { display:flex; gap:8px; padding:10px; border-top:1px solid #242842; }
.aic-in textarea { flex:1; background:#161929; color:#e8e8e8; border:1px solid #2d3052; border-radius:8px; padding:8px; font-size:13px; resize:none; height:40px; font-family:inherit; }
.aic-send { background:#3358e0; color:#fff; border:none; border-radius:8px; padding:0 16px; cursor:pointer; font-size:13px; }
.aic-send:disabled { opacity:.5; }
.aic-tip { padding:12px 14px; color:#9ca3af; font-size:12px; line-height:1.7; }
</style>
<div id="aic-btn" title="AI 投研助手（接真实A股数据）">🤖</div>
<div id="aic-panel">
  <div class="aic-head">
    <b>🤖 AI 投研助手</b>
    <span class="aic-ico" id="aic-list" title="历史会话">📋</span>
    <span class="aic-ico" id="aic-new" title="新对话">＋</span>
    <span class="aic-ico" id="aic-close" title="关闭">✕</span>
  </div>
  <div class="aic-ses" id="aic-seslist"></div>
  <div class="aic-msgs" id="aic-msgs"></div>
  <div class="aic-in">
    <textarea id="aic-text" placeholder="问点什么…（Enter 发送 / Shift+Enter 换行）"></textarea>
    <button class="aic-send" id="aic-sendbtn">发送</button>
  </div>
</div>
<script>
(function(){
  const $=id=>document.getElementById(id);
  let sid=null, busy=false;
  const esc=s=>(s==null?'':String(s)).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
  const TIP='<div class="aic-tip">问我 A股的事 —— 我会去查 <b style="color:#7c9ef8">真实数据</b>（行情/财报/研报/新闻/你的持仓/板块）再回答。<br>'
    +'例：「中际旭创基本面和风险」「我的持仓有啥要注意的」「CPO板块最近资金怎么样」<br>'
    +'<span style="color:#6b7280">仅供研究 · 不预测涨跌 · 不构成投资建议</span></div>';

  // 紧凑 markdown → html（表格/标题/列表/粗体/引用/代码）
  function md(t){
    t=esc(t);
    t=t.replace(/(?:^\|.*\|[ \t]*\n?)+/gm, block=>{
      const rows=block.trim().split('\n').filter(r=>r.trim()); let out='<table>', start=0;
      if(rows[1] && /^\|[\s:|-]+\|$/.test(rows[1].replace(/ /g,''))){
        out+='<tr>'+rows[0].split('|').slice(1,-1).map(c=>'<th>'+c.trim()+'</th>').join('')+'</tr>'; start=2; }
      for(let i=start;i<rows.length;i++) out+='<tr>'+rows[i].split('|').slice(1,-1).map(c=>'<td>'+c.trim()+'</td>').join('')+'</tr>';
      return out+'</table>'; });
    t=t.replace(/^### (.*)$/gm,'<h3>$1</h3>').replace(/^## (.*)$/gm,'<h2>$1</h2>').replace(/^# (.*)$/gm,'<h1>$1</h1>');
    t=t.replace(/^&gt; (.*)$/gm,'<blockquote>$1</blockquote>');
    t=t.replace(/^[-*] (.*)$/gm,'<li>$1</li>').replace(/(<li>[\s\S]*?<\/li>\n?)+/g,m=>'<ul>'+m+'</ul>');
    t=t.replace(/\*\*([^*]+)\*\*/g,'<b>$1</b>').replace(/`([^`]+)`/g,'<code>$1</code>');
    t=t.replace(/^(?!\s*<(?:h\d|ul|li|table|tr|blockquote))(.+)$/gm,'<div>$1</div>');
    return t;
  }
  function scrollB(){ const m=$('aic-msgs'); m.scrollTop=m.scrollHeight; }
  function addMsg(role, html){
    const d=document.createElement('div'); d.className='aic-msg '+role;
    d.innerHTML='<div class="bubble">'+html+'</div>'; $('aic-msgs').appendChild(d); scrollB(); return d.querySelector('.bubble');
  }
  function showMsgs(list){
    $('aic-msgs').innerHTML = (list&&list.length) ? '' : TIP;
    (list||[]).forEach(m=> addMsg(m.role==='user'?'user':'ai', m.role==='user'?esc(m.content):('<div class="aic-md">'+md(m.content)+'</div>')));
  }

  async function loadSessions(){
    try{ const j=await (await fetch('/api/chat/sessions')).json();
      $('aic-seslist').innerHTML=(j.sessions||[]).map(s=>
        '<div class="aic-srow'+(s.id===sid?' cur':'')+'" data-id="'+s.id+'"><span>'+esc(s.title||'新对话')+'</span><span class="del" data-del="'+s.id+'">删</span></div>').join('')
        || '<div class="aic-srow neu2">暂无历史</div>';
    }catch(e){}
  }
  async function newSession(open){ const j=await (await fetch('/api/chat/session',{method:'POST'})).json();
    sid=j.id; showMsgs([]); $('aic-seslist').classList.remove('open'); if(open) loadSessions(); }
  async function openSession(id){ sid=id;
    const j=await (await fetch('/api/chat/session/'+id)).json(); showMsgs(j.messages); $('aic-seslist').classList.remove('open'); loadSessions(); }
  async function delSession(id){ await fetch('/api/chat/session/'+id+'/delete',{method:'POST'});
    if(id===sid){ sid=null; showMsgs([]); } loadSessions(); }

  async function send(){
    const text=$('aic-text').value.trim(); if(!text||busy) return;
    if(!sid) await newSession(false);
    busy=true; $('aic-sendbtn').disabled=true; $('aic-text').value='';
    if($('aic-msgs').querySelector('.aic-tip')) $('aic-msgs').innerHTML='';
    addMsg('user', esc(text));
    const bubble=addMsg('ai','<span class="aic-status">⏳ 正在思考…</span>');
    let answer='';
    try{
      const resp=await fetch('/api/chat/stream',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({session_id:sid,message:text})});
      const reader=resp.body.getReader(), dec=new TextDecoder(); let buf='';
      while(true){ const {value,done}=await reader.read(); if(done) break;
        buf+=dec.decode(value,{stream:true}); let i;
        while((i=buf.indexOf('\n\n'))>=0){ const line=buf.slice(0,i); buf=buf.slice(i+2);
          if(!line.startsWith('data: ')) continue;
          let ev; try{ ev=JSON.parse(line.slice(6)); }catch(e){ continue; }
          if(ev.type==='status'||ev.type==='thinking'){ if(!answer) bubble.innerHTML='<span class="aic-status">'+esc(ev.text)+'</span>'; }
          else if(ev.type==='delta'){ answer+=ev.text; bubble.innerHTML='<div class="aic-md">'+md(answer)+'</div>'; scrollB(); }
          else if(ev.type==='error'){ bubble.innerHTML='<span style="color:#f87171">'+esc(ev.text)+'</span>'; }
        }
      }
      if(answer) bubble.innerHTML='<div class="aic-md">'+md(answer)+'</div>';
      loadSessions();
    }catch(e){ bubble.innerHTML='<span style="color:#f87171">❌ '+esc(e)+'</span>'; }
    finally{ busy=false; $('aic-sendbtn').disabled=false; scrollB(); }
  }

  $('aic-btn').onclick=()=>{ const p=$('aic-panel'); p.classList.toggle('open');
    if(p.classList.contains('open')){ if(!$('aic-msgs').innerHTML) $('aic-msgs').innerHTML=TIP; loadSessions(); $('aic-text').focus(); } };
  $('aic-close').onclick=()=>$('aic-panel').classList.remove('open');
  $('aic-new').onclick=()=>newSession(true);
  $('aic-list').onclick=()=>{ $('aic-seslist').classList.toggle('open'); loadSessions(); };
  $('aic-seslist').onclick=e=>{ const del=e.target.closest('[data-del]'); if(del){ e.stopPropagation(); delSession(+del.dataset.del); return; }
    const row=e.target.closest('[data-id]'); if(row) openSession(+row.dataset.id); };
  $('aic-sendbtn').onclick=send;
  $('aic-text').addEventListener('keydown',e=>{ if(e.key==='Enter'&&!e.shiftKey){ e.preventDefault(); send(); } });
})();
</script>
</body>
</html>
